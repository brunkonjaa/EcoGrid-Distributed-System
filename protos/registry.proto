syntax = "proto3";

package registry;

// Registry Service (Bidirectional Streaming RPC)
service RegistryService {
  // Services register/heartbeat; clients can request discovery on the same stream
  rpc ServiceRegistryStream (stream RegistryMessage) returns (stream RegistryMessage);
}

enum RegistryMessageType {
  REGISTRY_MESSAGE_TYPE_UNSPECIFIED = 0;
  REGISTER = 1;
  HEARTBEAT = 2;
  DISCOVER_REQUEST = 3;
  DISCOVER_RESPONSE = 4;
  ACK = 5;
  ERROR = 6;
}

message ServiceInfo {
  string service_name = 1;
  string host = 2;
  int32 port = 3;
  string rpc_package = 4;
  string timestamp = 5;
}

message RegistryMessage {
  RegistryMessageType type = 1;
  string message = 2;
  ServiceInfo service = 3;
  repeated ServiceInfo services = 4;
  string timestamp = 5;
}
