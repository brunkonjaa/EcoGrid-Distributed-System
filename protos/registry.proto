syntax = "proto3";

package registry;

// Registry Service (Bidirectional Streaming RPC)
service RegistryService {
  // Services register themselves and clients discover services
  rpc RegisterAndDiscover (stream RegistryRequest) returns (stream RegistryResponse);
}

// Request message
message RegistryRequest {
  string service_name = 1;
  string host = 2;
  int32 port = 3;
  string action = 4; // REGISTER or DISCOVER
}

// Response message
message RegistryResponse {
  string service_name = 1;
  string host = 2;
  int32 port = 3;
  string status = 4;
}
