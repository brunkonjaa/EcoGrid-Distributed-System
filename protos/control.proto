syntax = "proto3";

package control;

// Control Service (Client Streaming RPC)
service ControlService {
  // Send multiple inputs and receive a single decision
  rpc SendSensorData (stream ControlRequest) returns (ControlResponse);
}

// Request message (streamed from client)
message ControlRequest {
  string area = 1;
  float temperature_value = 2;
  bool occupied = 3;
  int32 people_count = 4;
}

// Response message
message ControlResponse {
  string area = 1;
  string action = 2;
  string reason = 3;
}
