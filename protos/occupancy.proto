syntax = "proto3";

package occupancy;

// Occupancy Service (Server Streaming RPC)
service OccupancyService {
  // Subscribe to occupancy updates for an area
  rpc SubscribeOccupancy (OccupancyRequest) returns (stream OccupancyResponse);
}

// Request message
message OccupancyRequest {
  string area = 1;
}

// Response message (streamed)
message OccupancyResponse {
  string area = 1;
  bool occupied = 2;
  int32 people_count = 3;
  string timestamp = 4;
  string status_message = 5;
}
